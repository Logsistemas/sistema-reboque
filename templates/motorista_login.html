<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login do Motorista</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body{background:#eef2f7}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(15,23,42,.12);width:100%;max-width:430px;padding:28px}
    .login-card h1{margin:0 0 8px}
    .login-card form{display:grid;gap:12px;margin-top:18px}
    .erro{background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px;margin-top:12px;font-weight:700}
    .help{font-size:13px;color:#64748b;line-height:1.45}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>🚛 Área do Motorista</h1>
      <p class="help">Entre com seu login/senha e informe a placa do veículo que você vai trabalhar hoje.</p>
      {% if erro %}<div class="erro">{{erro}}</div>{% endif %}
      <form method="post" action="/motorista/login">
        <input name="login" placeholder="Login ou CPF" required>
        <input name="senha" type="password" placeholder="Senha" required>
        <input name="placa" placeholder="Placa do veículo do dia. Ex: ABC1D23" required>
        <button>Entrar</button>
      </form>
      <p class="help">A placa informada aqui aparece automaticamente para a central.</p>
    </div>
  </div>
</body>
</html>
