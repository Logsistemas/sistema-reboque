<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/static/style.css"><style>.page{max-width:1100px;margin:20px auto}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-grid .full{grid-column:1/-1}.top a,.top button{color:#fff}.card form{display:grid;gap:10px}.actions{display:flex;gap:10px;margin-top:12px}.menu-title{font-size:22px;font-weight:800}</style><title>Cadastrar serviço</title></head><body><div class="top app-top"><span>🚛 Sistema Interno de Reboque</span><span><a href="/">Central</a><a href="/operacao">Operação ao vivo</a><a href="/historico">Histórico / Relatórios</a><a href="/faturamento">Faturamento</a></span></div><div class="page"><div class="card"><div class="menu-title">Cadastrar serviço manualmente</div><form method="post" action="/servicos" id="form-servico"><div class="form-grid"><input name="protocolo" placeholder="Protocolo" required><input name="seguradora" placeholder="Seguradora"><select name="tipo" id="tipo-servico" required onchange="montarItensFinanceiros()"><option value="">Selecione o tipo de serviço</option>{% for t in tipos_servico %}<option value="{{t}}">{{t}}</option>{% endfor %}</select><input name="beneficiario" placeholder="Beneficiário / cliente"><textarea class="full" name="origem" placeholder="Origem completa" required></textarea><textarea class="full" name="destino" placeholder="Destino completo" required></textarea><textarea class="full" name="observacao" placeholder="Observação"></textarea></div><div class="actions"><button>Criar serviço</button><a class="btn dark" href="/">Voltar</a></div></form></div></div></body></html>
