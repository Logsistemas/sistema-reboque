<div class="ctrl-form-grid">
  {% with required=true %}{% include 'controle/partials/ac_viatura.html' %}{% endwith %}
  <div class="ctrl-field"><label>Data</label><input type="date" name="data"></div>
  <div class="ctrl-field"><label>Hodômetro</label><input type="number" min="0" name="hodometro"></div>
  <div class="ctrl-field"><label>Documento</label><input type="text" name="documento"></div>
  <div class="ctrl-field"><label>Fornecedor</label><input type="text" name="fornecedor"></div>
  <div class="ctrl-field full"><label>Observação</label><textarea name="observacao" rows="2"></textarea></div>
</div>
<section class="ctrl-itens-block">
  <div class="ctrl-itens-head">
    <h3>Itens da manutenção</h3>
    <button type="button" class="ctrl-btn ctrl-btn-outline" id="btnAddItemManutencao">+ Item</button>
  </div>
  <div class="ctrl-table-wrap">
    <table class="ctrl-table" id="tabelaItensManutencao">
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor unit.</th>
          <th>Qtd</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <div class="ctrl-form-grid ctrl-totais-manut">
    <div class="ctrl-field"><label>Total produtos</label><input type="number" step="0.01" min="0" name="total_produtos" id="ctrlTotalProdutos"></div>
    <div class="ctrl-field"><label>Total serviços</label><input type="number" step="0.01" min="0" name="total_servicos" id="ctrlTotalServicos"></div>
    <div class="ctrl-field"><label>Total geral</label><input type="number" step="0.01" min="0" name="total" id="ctrlTotalGeral" required></div>
  </div>
</section>
