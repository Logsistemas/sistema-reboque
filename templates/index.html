<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema Reboque - Central</title>
</head>
<body>

<h2>Serviços</h2>

<table border="1">
<thead>
<tr>
<th>ID</th>
<th>Protocolo</th>
<th>Seguradora</th>
<th>Tipo</th>
<th>Origem → Destino</th>
<th>Status</th>
<th>Motorista</th>
<th>Placa</th>
<th>Fotos</th>
<th>Último evento</th>
</tr>
</thead>
<tbody>
</tbody>
</table>

<script>
async function atualizarCentral() {
    try {
        const res = await fetch('/api/servicos');
        const data = await res.json();

        let tabela = document.querySelector("table tbody");
        tabela.innerHTML = "";

        data.forEach(servico => {
            let linha = `
                <tr>
                    <td>${servico.id}</td>
                    <td>${servico.protocolo}</td>
                    <td>${servico.seguradora}</td>
                    <td>${servico.tipo}</td>
                    <td>${servico.origem} → ${servico.destino}</td>
                    <td>${servico.status}</td>
                    <td>${servico.motorista || '-'}</td>
                    <td>${servico.placa || '-'}</td>
                    <td>${servico.fotos ? '✔' : '-'}</td>
                    <td>${servico.ultimo_evento || '-'}</td>
                </tr>
            `;
            tabela.innerHTML += linha;
        });

    } catch (err) {
        console.log("Erro:", err);
    }
}

setInterval(atualizarCentral, 5000);
atualizarCentral();
</script>

</body>
</html>
