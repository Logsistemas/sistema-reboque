<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Área do Motorista</title><link rel="stylesheet" href="/static/style.css"></head><body><div class="topbar">🚚 Área do Motorista</div><main class="motorista-page">{% if not m %}<div class="card"><h1>Motorista não encontrado</h1></div>{% else %}<div class="card"><h1>{{m.nome}}</h1><p id="statusLocalizacao">Status: {{ 'Online' if m.online else 'Offline' }} - {{m.ultima_atualizacao or '-'}}</p><button class="btn btn-primary btn-full" onclick="ficarOnline()">Ficar ONLINE e enviar localização</button><br><br><button class="btn btn-dark btn-full" onclick="ficarOffline()">Ficar OFFLINE</button></div><div class="card"><h2>Serviços enviados</h2><div id="servicos">Carregando...</div></div>{% endif %}</main><script>
const MID = '{{m.id if m else ""}}';
function msg(t){const el=document.getElementById('statusLocalizacao'); if(el) el.textContent=t}
function ficarOnline(){if(!navigator.geolocation){alert('Seu celular não liberou localização.');return}navigator.geolocation.getCurrentPosition(async pos=>{let r=await fetch(`/api/motoristas/${MID}/localizacao`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:pos.coords.latitude,lng:pos.coords.longitude,online:true})});msg('Online - localização enviada: '+new Date().toLocaleTimeString());carregarServicos()},err=>alert('Permita a localização do celular para ficar online.'))}
async function ficarOffline(){await fetch(`/api/motoristas/${MID}/offline`,{method:'POST'});msg('Offline: '+new Date().toLocaleTimeString())}
function escapeHtml(v){return String(v??'').replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]))}
async function mudarStatus(id,status){let fd=new FormData();fd.append('status',status);let r=await fetch(`/api/servicos/${id}/status`,{method:'POST',body:fd});let j=await r.json();if(!j.ok){alert(j.erro||'Erro ao alterar status')}await carregarServicos()}
async function enviarPlaca(id){let input=document.getElementById('placa_'+id);let placa=(input.value||'').trim();if(!placa){alert('Digite a placa do veículo removido.');input.focus();return}let fd=new FormData();fd.append('placa_veiculo',placa);let r=await fetch(`/api/servicos/${id}/placa`,{method:'POST',body:fd});let j=await r.json();if(j.ok){alert('Placa enviada para a central.');await carregarServicos()}else{alert(j.erro||'Erro ao enviar placa')}}
async function enviarFotos(id){let inp=document.getElementById('fotos_'+id);if(!inp.files||inp.files.length===0){alert('Selecione uma ou mais fotos.');return}let fd=new FormData();for(let f of inp.files){fd.append('fotos',f)}let r=await fetch(`/api/servicos/${id}/fotos`,{method:'POST',body:fd});let j=await r.json();if(j.ok){alert(`${j.fotos.length} foto(s) enviada(s) para a central.`);inp.value='';await carregarServicos()}else{alert(j.erro||'Erro ao enviar fotos')}}
async function finalizar(id){if(!confirm('Finalizar serviço no destino?'))return;let r=await fetch(`/api/servicos/${id}/finalizar`,{method:'POST'});let j=await r.json();if(j.ok){alert('Serviço finalizado.');await carregarServicos()}else{alert(j.erro||'Erro ao finalizar')}}
async function carregarServicos(){if(!MID)return;let data=await fetch(`/api/motorista/${MID}/servicos`).then(r=>r.json());let box=document.getElementById('servicos');if(!data.length){box.innerHTML='<p>Nenhum serviço enviado no momento.</p>';return}box.innerHTML=data.map(s=>{let fotos=(s.fotos||[]).map((f,i)=>`<a href="${f}" target="_blank">foto ${i+1}</a>`).join(' | ');return `<div class="service-card"><h3>${escapeHtml(s.protocolo)} - ${escapeHtml(s.tipo)}</h3><p><b>${escapeHtml(s.seguradora||'')}</b></p><p><b>Origem:</b> ${escapeHtml(s.origem)}</p><p><b>Destino:</b> ${escapeHtml(s.destino)}</p><p><b>Status:</b> <span class="badge">${escapeHtml(s.status)}</span></p><a class="btn btn-blue btn-full" target="_blank" href="https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(s.origem||'')}&destination=${encodeURIComponent(s.destino||'')}">Abrir rota</a><hr><div class="grid2"><button class="btn btn-primary" onclick="mudarStatus('${s.id}','aceito')">Aceitar</button><button class="btn btn-red" onclick="mudarStatus('${s.id}','recusado')">Recusar</button><button class="btn btn-primary" onclick="mudarStatus('${s.id}','a caminho')">A caminho</button><button class="btn btn-primary" onclick="mudarStatus('${s.id}','na origem')">Na origem</button><button class="btn btn-primary" onclick="mudarStatus('${s.id}','em transporte')">Em transporte</button></div><hr><label><b>Placa do veículo removido</b></label><input id="placa_${s.id}" placeholder="Ex: ABC1D23" value="${escapeHtml(s.placa_veiculo_removido||'')}" style="width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px;margin:8px 0;font-size:18px;text-transform:uppercase"><button class="btn btn-green btn-full" onclick="enviarPlaca('${s.id}')">Enviar placa para a central</button><hr><label><b>Fotos / checklist do veículo</b></label><input id="fotos_${s.id}" type="file" accept="image/*" capture="environment" multiple style="width:100%;margin:8px 0"><button class="btn btn-blue btn-full" onclick="enviarFotos('${s.id}')">Enviar fotos/checklist para a central</button><p class="small">Fotos já enviadas: ${fotos || 'nenhuma'}</p><hr><button class="btn btn-dark btn-full" onclick="finalizar('${s.id}')">Finalizar serviço no destino</button></div>`}).join('')}
carregarServicos();
</script></body></html>
