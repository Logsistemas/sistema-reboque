
<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Área do Motorista</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="driver">
<header>🚚 Área do Motorista</header>

<main class="driver-main">
  <section class="card">
    {% if m %}
      <h1>{{m.nome}}</h1>
      <p id="statusMotorista">Offline</p>
      <button onclick="ficarOnline()">Ficar ONLINE e enviar localização</button>
      <button class="dark" onclick="ficarOffline()">Ficar OFFLINE</button>
    {% else %}
      <h1>Motorista não encontrado</h1>
    {% endif %}
  </section>

  <section class="card">
    <h2>Serviços enviados</h2>
    <div id="servicos">Carregando...</div>
  </section>
</main>

<script>
const motoristaId = "{{m.id if m else ''}}";
let watchId = null;
let digitando = false;

function apiPost(url, data){
  return fetch(url, {method:'POST', body:data}).then(r=>r.json());
}

function ficarOnline(){
  if(!navigator.geolocation){ alert('GPS não disponível'); return; }
  if(watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos=>{
    fetch(`/api/motoristas/${motoristaId}/localizacao`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({lat:pos.coords.latitude, lng:pos.coords.longitude, online:true})
    });
    document.getElementById('statusMotorista').innerText = 'Online - localização enviada: ' + new Date().toLocaleTimeString();
  }, err=>alert('Permita a localização no navegador'), {enableHighAccuracy:true});
}

function ficarOffline(){
  fetch(`/api/motoristas/${motoristaId}/offline`, {method:'POST'});
  document.getElementById('statusMotorista').innerText = 'Offline';
}

async function mudarStatus(id, status){
  const fd = new FormData();
  fd.append('status', status);
  const res = await apiPost(`/api/servicos/${id}/status`, fd);
  if(res.ok){ carregarServicos(true); }
  else alert(res.erro || 'Erro ao mudar status');
}

async function enviarPlaca(id){
  const input = document.getElementById(`placa_${id}`);
  const placa = input.value.trim();
  if(!placa){ alert('Digite a placa primeiro'); return; }
  const fd = new FormData();
  fd.append('placa_veiculo', placa);
  const res = await apiPost(`/api/servicos/${id}/placa`, fd);
  if(res.ok){
    alert('Placa enviada para a central');
    carregarServicos(true);
  } else alert(res.erro || 'Erro ao enviar placa');
}

async function enviarFotos(id){
  const input = document.getElementById(`fotos_${id}`);
  if(!input.files.length){ alert('Selecione pelo menos uma foto'); return; }
  const fd = new FormData();
  for(const f of input.files){ fd.append('fotos', f); }
  const res = await apiPost(`/api/servicos/${id}/fotos`, fd);
  if(res.ok){
    alert('Fotos enviadas: ' + res.fotos.length);
    input.value = '';
    carregarServicos(true);
  } else alert(res.erro || 'Erro ao enviar fotos');
}

async function finalizar(id){
  if(!confirm('Finalizar serviço no destino?')) return;
  const res = await fetch(`/api/servicos/${id}/finalizar`, {method:'POST'}).then(r=>r.json());
  if(res.ok){ carregarServicos(true); }
  else alert(res.erro || 'Erro ao finalizar');
}

function rota(origem, destino){
  return 'https://www.google.com/maps/dir/?api=1&origin=' + encodeURIComponent(origem) + '&destination=' + encodeURIComponent(destino);
}

async function carregarServicos(forcar=false){
  if(digitando && !forcar) return;
  const data = await fetch(`/api/motorista/${motoristaId}/servicos`).then(r=>r.json());
  const box = document.getElementById('servicos');
  if(!data.length){ box.innerHTML = '<p>Nenhum serviço enviado no momento.</p>'; return; }

  box.innerHTML = data.map(s=>`
    <div class="service-card">
      <h3>${s.protocolo || ''} - ${s.tipo || ''}</h3>
      <p><b>Cliente:</b> ${s.seguradora || ''}</p>
      <p><b>Origem:</b> ${s.origem || ''}</p>
      <p><b>Destino:</b> ${s.destino || ''}</p>
      <p><b>Status:</b> ${s.status || ''}</p>
      <a class="button-link" target="_blank" href="${rota(s.origem, s.destino)}">Abrir rota</a>

      <div class="actions">
        <button onclick="mudarStatus('${s.id}','aceito')">Aceitar</button>
        <button class="danger" onclick="mudarStatus('${s.id}','recusado')">Recusar</button>
        <button onclick="mudarStatus('${s.id}','a caminho')">A caminho</button>
        <button onclick="mudarStatus('${s.id}','na origem')">Na origem</button>
        <button onclick="mudarStatus('${s.id}','em transporte')">Em transporte</button>
      </div>

      <div class="checklist">
        <h4>Baixa na origem</h4>
        <label>Placa do veículo removido</label>
        <input id="placa_${s.id}" value="${s.placa_veiculo_removido || s.placa_removida || ''}" placeholder="Ex: ABC1D23"
          onfocus="digitando=true" onblur="setTimeout(()=>digitando=false, 1000)">
        <button onclick="enviarPlaca('${s.id}')">Enviar placa para a central</button>

        <h4>Checklist / fotos de avarias</h4>
        <input id="fotos_${s.id}" type="file" accept="image/*" multiple>
        <button onclick="enviarFotos('${s.id}')">Enviar fotos/checklist</button>

        <h4>Finalização</h4>
        <button class="dark" onclick="finalizar('${s.id}')">Finalizar serviço no destino</button>
      </div>
    </div>
  `).join('');
}

setInterval(()=>carregarServicos(false), 4000);
carregarServicos(true);
</script>
</body>
</html>
